<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>个人财务管家 - 登录</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#ffd7f4",
                        "on-primary-fixed": "#221823",
                        "on-tertiary-container": "#845c88",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#ffd6ff",
                        "surface": "#fff8f8",
                        "on-surface-variant": "#4b454a",
                        "on-error-container": "#93000a",
                        "primary-fixed": "#f0dded",
                        "on-tertiary-fixed-variant": "#5e3963",
                        "on-tertiary-fixed": "#2e0d34",
                        "on-secondary-fixed-variant": "#5b3d56",
                        "surface-tint": "#685a67",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#746673",
                        "surface-container": "#ffe8f1",
                        "inverse-surface": "#442738",
                        "surface-dim": "#fbcee4",
                        "background": "#fff8f8",
                        "primary-fixed-dim": "#d3c1d1",
                        "surface-variant": "#ffd8eb",
                        "on-tertiary": "#ffffff",
                        "outline": "#7c757a",
                        "outline-variant": "#cdc4ca",
                        "on-primary-fixed-variant": "#4f434f",
                        "inverse-on-surface": "#ffecf3",
                        "surface-container-low": "#fff0f5",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "secondary": "#75546e",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#ffd8eb",
                        "surface-container-high": "#ffe0ee",
                        "tertiary": "#78517c",
                        "primary": "#685a67",
                        "on-background": "#2d1323",
                        "surface-bright": "#fff8f8",
                        "primary-container": "#f9e6f6",
                        "on-secondary-container": "#795873",
                        "secondary-fixed-dim": "#e3bad9",
                        "secondary-container": "#fed3f3",
                        "tertiary-fixed-dim": "#e7b7e9",
                        "tertiary-container": "#ffe3fd",
                        "on-surface": "#2d1323",
                        "on-secondary-fixed": "#2c1229",
                        "inverse-primary": "#d3c1d1"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-padding": "20px",
                        "base": "8px",
                        "gutter": "16px",
                        "stack-sm": "12px",
                        "stack-md": "24px",
                        "stack-lg": "40px"
                    },
                    "fontFamily": {
                        "body-md": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "numeral-xl": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "title-lg": ["Hanken Grotesk"],
                        "label-md": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                        "numeral-xl": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.03em", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .velvet-panel {
            background: rgba(255, 248, 248, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 216, 235, 0.5);
        }
        .velvet-bg {
            background: radial-gradient(circle at top right, #fff0f5 0%, #fff8f8 50%, #ffffff 100%);
        }
        .soft-shadow {
            box-shadow: 0 10px 40px -10px rgba(104, 90, 103, 0.15);
        }
        .btn-velvet {
            background: linear-gradient(135deg, #78517c 0%, #685a67 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-velvet:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(120, 81, 124, 0.3);
        }
        .input-focus-accent:focus {
            outline: none;
            border-bottom: 2px solid #78517c;
        }
    </style>
</head>
<body class="velvet-bg min-h-screen flex items-center justify-center p-gutter font-body-md text-on-surface">
<main class="w-full max-w-[440px] relative">
<!-- Background decorative elements -->
<div class="absolute -top-24 -left-24 w-64 h-64 bg-secondary-fixed/20 rounded-full blur-[80px] pointer-events-none"></div>
<div class="absolute -bottom-24 -right-24 w-64 h-64 bg-tertiary-fixed/15 rounded-full blur-[80px] pointer-events-none"></div>
<!-- Auth Card -->
<div class="velvet-panel soft-shadow rounded-[32px] p-10 relative overflow-hidden">
<!-- Logo & Title Section -->
<div class="flex flex-col items-center mb-stack-lg">
<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center mb-4 border border-surface-variant/30">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-background tracking-tight">个人财务管家</h1>
<p class="font-body-md text-on-surface-variant mt-2">温润理财，质感生活</p>
</div>
<!-- Tabs/Toggle -->
<div class="flex bg-surface-container-low p-1.5 rounded-xl mb-stack-md">
<button class="flex-1 py-2 rounded-lg font-label-md text-label-md transition-all duration-300 bg-white text-tertiary soft-shadow" id="tab-login">
                    登录
                </button>
<button class="flex-1 py-2 rounded-lg font-label-md text-label-md hover:text-tertiary transition-all duration-300 text-on-surface-variant" id="tab-register" onclick="window.location.href='register.html'">
                    注册
                </button>
</div>
<!-- Form -->
<form class="space-y-stack-md" id="auth-form" onsubmit="return false;">
<!-- Input Fields -->
<div class="space-y-stack-sm">
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant/50 group-focus-within:text-tertiary transition-colors">person</span>
<input class="w-full pl-10 pr-4 py-4 bg-transparent border-b border-outline-variant/40 text-body-lg font-body-lg input-focus-accent transition-all placeholder:text-on-surface-variant/40" placeholder="用户名" required="" type="text">
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant/50 group-focus-within:text-tertiary transition-colors">lock</span>
<input class="w-full pl-10 pr-12 py-4 bg-transparent border-b border-outline-variant/40 text-body-lg font-body-lg input-focus-accent transition-all placeholder:text-on-surface-variant/40" placeholder="密码" required="" type="password">
<button class="absolute right-0 top-1/2 -translate-y-1/2 text-on-surface-variant/50 hover:text-tertiary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Remember Me & Forgot -->
<div class="flex items-center justify-between py-2">
<label class="flex items-center cursor-pointer group">
<div class="relative">
<input class="sr-only peer" type="checkbox">
<div class="w-5 h-5 border-2 border-outline-variant/60 rounded-md peer-checked:bg-tertiary peer-checked:border-tertiary transition-all"></div>
<span class="material-symbols-outlined absolute inset-0 text-white text-[16px] scale-0 peer-checked:scale-100 transition-transform flex items-center justify-center">check</span>
</div>
<span class="ml-3 font-body-md text-body-md text-on-surface-variant group-hover:text-tertiary transition-colors">记住我</span>
</label>
<a class="font-body-md text-body-md text-tertiary hover:underline underline-offset-4 decoration-tertiary/30" href="#">忘记密码？</a>
</div>
<!-- Action Button -->
<button class="w-full py-4 rounded-2xl btn-velvet text-white font-title-lg text-title-lg flex items-center justify-center gap-2 mt-4" type="submit" onclick="window.location.href='home.html'">
<span id="submit-text" class="">立即登录</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Alternative Methods -->
<div class="pt-8 text-center">
<p class="font-label-md text-label-md text-on-surface-variant/50 relative before:content-[''] before:absolute before:left-0 before:top-1/2 before:w-[30%] before:h-[1px] before:bg-outline-variant/30 after:content-[''] after:absolute after:right-0 after:top-1/2 after:w-[30%] after:h-[1px] after:bg-outline-variant/30">
                        或者使用
                    </p>
<div class="flex justify-center gap-stack-md mt-6">
<button aria-label="WeChat" class="w-12 h-12 rounded-full border border-outline-variant/30 flex items-center justify-center hover:bg-surface-container-low transition-all active:scale-95 group">
<span class="material-symbols-outlined text-[24px] text-on-surface-variant group-hover:text-tertiary">chat</span>
</button>
<button aria-label="Alipay" class="w-12 h-12 rounded-full border border-outline-variant/30 flex items-center justify-center hover:bg-surface-container-low transition-all active:scale-95 group">
<span class="material-symbols-outlined text-[24px] text-on-surface-variant group-hover:text-tertiary">payments</span>
</button>
</div>
</div>
</form>
</div>
<!-- Footer -->
<footer class="text-center mt-8 font-body-md text-on-surface-variant/60">
<p class="">© 2024 个人财务管家. 让每一分钱都有意义.</p>
</footer>
</main>
<script>
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const submitText = document.getElementById('submit-text');

        tabLogin.addEventListener('click', () => {
            tabLogin.classList.add('bg-white', 'text-tertiary', 'soft-shadow');
            tabLogin.classList.remove('text-on-surface-variant');
            tabRegister.classList.remove('bg-white', 'text-tertiary', 'soft-shadow');
            tabRegister.classList.add('text-on-surface-variant');
            submitText.innerText = '立即登录';
        });

        tabRegister.addEventListener('click', () => {
            tabRegister.classList.add('bg-white', 'text-tertiary', 'soft-shadow');
            tabRegister.classList.remove('text-on-surface-variant');
            tabLogin.classList.remove('bg-white', 'text-tertiary', 'soft-shadow');
            tabLogin.classList.add('text-on-surface-variant');
            submitText.innerText = '立即注册';
        });

        // Simple input animation
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>


</body></html>
