<script>
        // Default categories (same as categories.html)
        const defaultCategories = {
            income: [
                { id: 1, name: '工资', emoji: '💼', desc: '每月固定工资收入' },
                { id: 2, name: '奖金', emoji: '🎁', desc: '年终奖、季度奖等' },
                { id: 3, name: '兼职', emoji: '💻', desc: '兼职、副业收入' },
                { id: 4, name: '投资收益', emoji: '📈', desc: '股票、基金收益' },
                { id: 5, name: '理财收益', emoji: '💰', desc: '银行理财、P2P收益' },
                { id: 6, name: '红包', emoji: '🧧', desc: '节日红包、转账' },
                { id: 7, name: '报销', emoji: '📄', desc: '公司报销款项' },
                { id: 8, name: '租金收入', emoji: '🏠', desc: '房屋出租收入' },
                { id: 9, name: '返现', emoji: '💳', desc: '信用卡返现、购物返利' },
                { id: 10, name: '其他收入', emoji: '💵', desc: '其他来源收入' }
            ],
            expense: [
                { id: 101, name: '餐饮', emoji: '🍜', desc: '早午晚餐、外卖' },
                { id: 102, name: '购物', emoji: '🛍️', desc: '衣服、日用品等' },
                { id: 103, name: '交通', emoji: '🚇', desc: '地铁、公交、打车' },
                { id: 104, name: '娱乐', emoji: '🎮', desc: '游戏、电影、KTV' },
                { id: 105, name: '健身', emoji: '🏋️', desc: '健身房、运动器材' },
                { id: 106, name: '居住', emoji: '🏠', desc: '房租、水电费' },
                { id: 107, name: '医疗', emoji: '💊', desc: '看病、买药' },
                { id: 108, name: '教育', emoji: '📚', desc: '培训、书籍、课程' },
                { id: 109, name: '通讯', emoji: '📱', desc: '话费、网费' },
                { id: 110, name: '美容', emoji: '💄', desc: '护肤品、化妆品' },
                { id: 111, name: '服饰', emoji: '👔', desc: '衣服、鞋子、配饰' },
                { id: 112, name: '旅游', emoji: '✈️', desc: '旅行、酒店、门票' },
                { id: 113, name: '社交', emoji: '🎉', desc: '聚会、请客' },
                { id: 114, name: '宠物', emoji: '🐕', desc: '宠物食品、用品' },
                { id: 115, name: '汽车', emoji: '🚗', desc: '加油、保养、停车' },
                { id: 116, name: '家居', emoji: '🛋️', desc: '家具、家电、装修' },
                { id: 117, name: '礼物', emoji: '🎀', desc: '送人的礼物' },
                { id: 118, name: '零食', emoji: '🍪', desc: '零食、饮料、水果' },
                { id: 119, name: '数码', emoji: '💻', desc: '电子产品、软件' },
                { id: 120, name: '其他支出', emoji: '📦', desc: '其他消费' }
            ]
        };

        // Load categories from localStorage or use defaults
        let categories = JSON.parse(localStorage.getItem('categories')) || defaultCategories;
        let currentType = 'expense'; // Default to expense
        let selectedCategory = null;

        // Switch between income and expense
        function switchCategoryType(type) {
            currentType = type;
            const expenseBtn = document.getElementById('btn-expense');
            const incomeBtn = document.getElementById('btn-income');
            const paymentSection = document.getElementById('paymentSection');

            if (type === 'expense') {
                expenseBtn.classList.add('bg-white', 'text-error', 'shadow-md');
                expenseBtn.classList.remove('text-on-surface-variant');
                incomeBtn.classList.remove('bg-white', 'text-tertiary', 'shadow-md');
                incomeBtn.classList.add('text-on-surface-variant');
                // Show payment section for expense
                paymentSection.style.display = 'flex';
            } else {
                incomeBtn.classList.add('bg-white', 'text-tertiary', 'shadow-md');
                incomeBtn.classList.remove('text-on-surface-variant');
                expenseBtn.classList.remove('bg-white', 'text-error', 'shadow-md');
                expenseBtn.classList.add('text-on-surface-variant');
                // Hide payment section for income
                paymentSection.style.display = 'none';
            }

            renderCategories();
        }

        // Render categories based on current type
        function renderCategories() {
            const grid = document.getElementById('categoryGrid');
            const items = categories[currentType];

            grid.innerHTML = items.map(item => `
                <button class="category-chip flex flex-col items-center gap-1 p-3 rounded-xl transition-all hover:bg-surface-container-high" onclick="selectCategory(this, ${item.id})">
                    <span class="text-2xl">${item.emoji}</span>
                    <span class="text-label-md">${item.name}</span>
                </button>
            `).join('');
        }

        // Select a category
        function selectCategory(el, categoryId) {
            document.querySelectorAll('.category-chip').forEach(btn => {
                btn.classList.remove('active');
            });
            el.classList.add('active');
            selectedCategory = categoryId;

            // Interaction feedback
            el.animate([
                { transform: 'scale(1)' },
                { transform: 'scale(0.95)' },
                { transform: 'scale(1.05)' },
                { transform: 'scale(1)' }
            ], { duration: 300 });
        }

        function selectPayment(el) {
            document.querySelectorAll('.payment-chip').forEach(btn => {
                btn.classList.remove('bg-secondary-container', 'text-on-secondary-container', 'font-bold');
            });
            el.classList.add('bg-secondary-container', 'text-on-secondary-container', 'font-bold');
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            // Render initial categories (expense)
            renderCategories();

            // Add a subtle atmospheric pulse to the main card
            const card = document.querySelector('.velvet-card');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';

            setTimeout(() => {
                card.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
