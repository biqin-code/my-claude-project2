<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>统计 - Velvet Ledger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../assets/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .stats-header {
      margin-bottom: var(--space-6);
    }

    .stats-title {
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--on-surface);
      margin-bottom: var(--space-2);
    }

    .stats-subtitle {
      font-size: var(--text-sm);
      color: var(--on-surface-variant);
    }

    .period-tabs {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-6);
    }

    .period-tab {
      padding: var(--space-2) var(--space-4);
      font-size: var(--text-sm);
      font-weight: 500;
      background: var(--surface);
      border: 1px solid var(--outline-variant);
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: all var(--motion-fast) var(--ease-out);
    }

    .period-tab:hover {
      border-color: var(--primary);
    }

    .period-tab.active {
      background: var(--primary);
      color: var(--on-primary);
      border-color: var(--primary);
    }

    .summary-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }

    .summary-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
    }

    .summary-card-label {
      font-size: var(--text-xs);
      color: var(--on-surface-variant);
      margin-bottom: var(--space-2);
    }

    .summary-card-value {
      font-size: var(--text-2xl);
      font-weight: 700;
    }

    .summary-card-value.income { color: var(--success); }
    .summary-card-value.expense { color: var(--error); }

    .summary-card-change {
      font-size: var(--text-xs);
      margin-top: var(--space-2);
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }

    .summary-card-change.up { color: var(--error); }
    .summary-card-change.down { color: var(--success); }

    .chart-section {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      margin-bottom: var(--space-6);
    }

    .chart-section-title {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--on-surface);
      margin-bottom: var(--space-4);
    }

    .chart-container {
      position: relative;
      height: 280px;
    }

    .chart-container.doughnut {
      height: 240px;
    }

    .category-legend {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-3);
      margin-top: var(--space-4);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2);
      background: var(--surface-low);
      border-radius: var(--radius-sm);
    }

    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
    }

    .legend-name {
      flex: 1;
      font-size: var(--text-xs);
      color: var(--on-surface);
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }

    .legend-value {
      font-size: var(--text-xs);
      color: var(--on-surface-variant);
    }

    .trend-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .trend-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3);
      background: var(--surface-low);
      border-radius: var(--radius-md);
    }

    .trend-rank {
      width: 24px;
      height: 24px;
      border-radius: var(--radius-full);
      background: var(--primary);
      color: var(--on-primary);
      font-size: var(--text-xs);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .trend-rank.top {
      background: linear-gradient(135deg, var(--primary), var(--tertiary));
    }

    .trend-info {
      flex: 1;
    }

    .trend-name {
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--on-surface);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .trend-amount {
      font-size: var(--text-xs);
      color: var(--on-surface-variant);
    }

    .quick-add {
      position: fixed;
      bottom: 90px;
      right: 24px;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--tertiary));
      color: var(--on-primary);
      border: none;
      border-radius: var(--radius-full);
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--elev-3);
      cursor: pointer;
      z-index: 90;
      transition: all var(--motion-fast) var(--ease-out);
      text-decoration: none;
    }

    .quick-add:hover {
      transform: scale(1.08);
    }

    @media (max-width: 480px) {
      .summary-cards {
        grid-template-columns: 1fr;
      }
      .category-legend {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Desktop Navigation -->
  <nav class="nav-desktop">
    <div class="nav-brand">
      <div class="nav-brand-logo">💰</div>
      <span class="nav-brand-name">Velvet</span>
    </div>
    <a href="home.html" class="nav-item">
      <span class="nav-item-icon">🏠</span>
      首页
    </a>
    <a href="records.html" class="nav-item">
      <span class="nav-item-icon">📋</span>
      明细
    </a>
    <a href="statistics.html" class="nav-item active">
      <span class="nav-item-icon">📊</span>
      统计
    </a>
    <a href="budget.html" class="nav-item">
      <span class="nav-item-icon">💰</span>
      预算
    </a>
    <a href="categories.html" class="nav-item">
      <span class="nav-item-icon">📁</span>
      分类
    </a>
    <a href="profile.html" class="nav-item">
      <span class="nav-item-icon">👤</span>
      我的
    </a>
  </nav>

  <!-- Mobile Bottom Navigation -->
  <nav class="nav-mobile">
    <a href="home.html" class="nav-item">
      <span class="nav-item-icon">🏠</span>
    </a>
    <a href="records.html" class="nav-item">
      <span class="nav-item-icon">📋</span>
    </a>
    <a href="add-expense.html" class="nav-item" style="transform:translateY(-20px);">
      <span class="nav-item-icon" style="width:56px;height:56px;background:linear-gradient(135deg, var(--primary), var(--tertiary));border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:28px;">+</span>
    </a>
    <a href="statistics.html" class="nav-item active">
      <span class="nav-item-icon">📊</span>
    </a>
    <a href="profile.html" class="nav-item">
      <span class="nav-item-icon">👤</span>
    </a>
  </nav>

  <!-- Main Content -->
  <main class="page-with-nav">
    <div class="page-content">
      <div class="stats-header">
        <h1 class="stats-title">支出统计</h1>
        <p class="stats-subtitle" id="statsSubtitle">分析你的消费分布</p>
      </div>

      <!-- Period Tabs -->
      <div class="period-tabs">
        <button class="period-tab active" data-period="week">本周</button>
        <button class="period-tab" data-period="month">本月</button>
        <button class="period-tab" data-period="3months">近3月</button>
      </div>

      <!-- Summary Cards -->
      <div class="summary-cards">
        <div class="summary-card">
          <div class="summary-card-label">总支出</div>
          <div class="summary-card-value expense" id="totalExpense">¥0.00</div>
          <div class="summary-card-change" id="expenseChange"></div>
        </div>
        <div class="summary-card">
          <div class="summary-card-label">日均消费</div>
          <div class="summary-card-value" id="dailyAvg">¥0.00</div>
          <div class="summary-card-change" id="dailyAvgNote">日</div>
        </div>
        <div class="summary-card">
          <div class="summary-card-label">最高支出分类</div>
          <div class="summary-card-value" id="topCategory" style="font-size:var(--text-lg);">—</div>
          <div class="summary-card-change" id="topCategoryAmount"></div>
        </div>
        <div class="summary-card">
          <div class="summary-card-label">支出笔数</div>
          <div class="summary-card-value" id="recordCount">0</div>
          <div class="summary-card-change" id="recordCountNote">笔</div>
        </div>
      </div>

      <!-- Category Chart -->
      <div class="chart-section">
        <div class="chart-section-title">支出分类占比</div>
        <div class="chart-container doughnut">
          <canvas id="categoryChart"></canvas>
        </div>
        <div class="category-legend" id="categoryLegend"></div>
      </div>

      <!-- Trend Chart -->
      <div class="chart-section">
        <div class="chart-section-title">消费趋势（近30天）</div>
        <div class="chart-container">
          <canvas id="trendChart"></canvas>
        </div>
      </div>

      <!-- Top Categories -->
      <div class="chart-section">
        <div class="chart-section-title">支出排行</div>
        <div class="trend-list" id="trendList"></div>
      </div>
    </div>
  </main>

  <!-- Floating Action Button -->
  <a href="add-expense.html" class="quick-add">+</a>

  <script src="../assets/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // requireAuth disabled for demo

      let categoryChart = null;
      let trendChart = null;
      let currentPeriod = 'month';

      loadStats();

      // 期限切换
      document.querySelectorAll('.period-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentPeriod = tab.dataset.period;
          loadStats();
        });
      });

      function loadStats() {
        const records = VelvetApp.Auth.getUserRecords();
        const { start, end } = VelvetApp.getDateRange(currentPeriod);

        // 筛选当周期数据
        const periodRecords = VelvetApp.filterRecords(records, {
          period: currentPeriod === 'week' ? 'week' : currentPeriod === 'month' ? 'month' : '3months'
        });

        const stats = VelvetApp.calculateStats(periodRecords);

        // 更新摘要卡片
        document.getElementById('totalExpense').textContent = '¥' + VelvetApp.formatCurrency(stats.totalExpense);
        document.getElementById('dailyAvg').textContent = '¥' + VelvetApp.formatCurrency(stats.dailyAvg);
        document.getElementById('recordCount').textContent = stats.recordCount;

        if (stats.topCategory) {
          document.getElementById('topCategory').innerHTML = `<span>${stats.topCategory.emoji}</span> ${stats.topCategory.name}`;
          document.getElementById('topCategoryAmount').textContent = '¥' + VelvetApp.formatCurrency(stats.topCategory.amount);
        }

        // 更新副标题
        const periodNames = { week: '本周', month: '本月', '3months': '近3月' };
        document.getElementById('statsSubtitle').textContent = `${periodNames[currentPeriod]}共 ${stats.recordCount} 笔记录`;

        // 渲染分类图表
        renderCategoryChart(stats.byCategory, stats.totalExpense);

        // 渲染趋势图表
        renderTrendChart(records);

        // 渲染排行
        renderTrendList(stats.byCategory);
      }

      function renderCategoryChart(byCategory, total) {
        const ctx = document.getElementById('categoryChart').getContext('2d');

        const entries = Object.entries(byCategory)
          .sort((a, b) => b[1].amount - a[1].amount)
          .slice(0, 8);

        if (categoryChart) {
          categoryChart.destroy();
        }

        const colors = [
          '#685a67', '#75546e', '#78517c', '#8b6b8a', '#9a7a99',
          '#a88aa8', '#b69ab7', '#c4aac6'
        ];

        categoryChart = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: entries.map(([_, cat]) => cat.name),
            datasets: [{
              data: entries.map(([_, cat]) => cat.amount),
              backgroundColor: colors.slice(0, entries.length),
              borderWidth: 0,
              hoverOffset: 4
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '65%',
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: (context) => {
                    const value = context.raw;
                    const percentage = ((value / total) * 100).toFixed(1);
                    return `¥${VelvetApp.formatCurrency(value)} (${percentage}%)`;
                  }
                }
              }
            }
          }
        });

        // 渲染图例
        const legendEl = document.getElementById('categoryLegend');
        legendEl.innerHTML = entries.map(([_, cat], i) => {
          const percentage = ((cat.amount / total) * 100).toFixed(1);
          return `
            <div class="legend-item">
              <div class="legend-color" style="background:${colors[i]}"></div>
              <span class="legend-name">
                <span>${cat.emoji}</span>
                <span>${cat.name}</span>
              </span>
              <span class="legend-value">${percentage}%</span>
            </div>
          `;
        }).join('');
      }

      function renderTrendChart(records) {
        const ctx = document.getElementById('trendChart').getContext('2d');

        // 最近30天数据
        const days = 30;
        const labels = [];
        const data = [];

        for (let i = days - 1; i >= 0; i--) {
          const date = new Date();
          date.setDate(date.getDate() - i);
          const dateStr = VelvetApp.formatDate(date);
          labels.push(dateStr.slice(5)); // MM-DD

          const dayRecords = records.filter(r => {
            const rDate = VelvetApp.formatDate(r.date);
            return rDate === dateStr && r.type === 'expense';
          });

          data.push(dayRecords.reduce((sum, r) => sum + r.amount, 0));
        }

        if (trendChart) {
          trendChart.destroy();
        }

        trendChart = new Chart(ctx, {
          type: 'line',
          data: {
            labels,
            datasets: [{
              label: '日支出',
              data,
              borderColor: '#685a67',
              backgroundColor: 'rgba(104, 90, 103, 0.1)',
              fill: true,
              tension: 0.4,
              pointRadius: 0,
              pointHoverRadius: 6,
              pointHoverBackgroundColor: '#685a67'
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: {
                grid: { display: false },
                ticks: { maxTicksLimit: 7 }
              },
              y: {
                beginAtZero: true,
                grid: { color: 'rgba(0,0,0,0.05)' }
              }
            },
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: (context) => '¥' + VelvetApp.formatCurrency(context.raw)
                }
              }
            }
          }
        });
      }

      function renderTrendList(byCategory) {
        const entries = Object.entries(byCategory)
          .sort((a, b) => b[1].amount - a[1].amount)
          .slice(0, 5);

        const trendListEl = document.getElementById('trendList');

        if (entries.length === 0) {
          trendListEl.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📊</div><div class="empty-state-title">暂无数据</div></div>';
          return;
        }

        trendListEl.innerHTML = entries.map(([id, cat], i) => `
          <div class="trend-item">
            <div class="trend-rank ${i === 0 ? 'top' : ''}">${i + 1}</div>
            <div class="trend-info">
              <div class="trend-name">
                <span>${cat.emoji}</span>
                <span>${cat.name}</span>
              </div>
              <div class="trend-amount">${cat.count} 笔 · ¥${VelvetApp.formatCurrency(cat.amount)}</div>
            </div>
          </div>
        `).join('');
      }
    });
  </script>
</body>
</html>
