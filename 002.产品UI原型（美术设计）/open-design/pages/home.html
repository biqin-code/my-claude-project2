<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首页 - Velvet Ledger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../assets/styles.css">
  <style>
    .home-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-8);
    }

    .home-greeting h1 {
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--on-surface);
    }

    .home-greeting p {
      font-size: var(--text-sm);
      color: var(--on-surface-variant);
      margin-top: var(--space-1);
    }

    .home-avatar {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--tertiary));
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-4);
      margin-bottom: var(--space-8);
    }

    .stat-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
    }

    .stat-card-label {
      font-size: var(--text-xs);
      color: var(--on-surface-variant);
      margin-bottom: var(--space-2);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .stat-card-value {
      font-size: var(--text-xl);
      font-weight: 700;
      color: var(--on-surface);
    }

    .stat-card-value.income { color: var(--success); }
    .stat-card-value.expense { color: var(--error); }

    .stat-card-change {
      font-size: var(--text-xs);
      margin-top: var(--space-2);
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }

    .stat-card-change.up { color: var(--error); }
    .stat-card-change.down { color: var(--success); }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-4);
    }

    .section-title {
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--on-surface);
    }

    .section-link {
      font-size: var(--text-sm);
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .section-link:hover {
      text-decoration: underline;
    }

    .budget-section {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      margin-bottom: var(--space-6);
    }

    .budget-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-4);
    }

    .budget-title {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--on-surface);
    }

    .budget-overview {
      display: flex;
      align-items: center;
      gap: var(--space-6);
    }

    .budget-progress-wrap {
      flex: 1;
    }

    .budget-amounts {
      display: flex;
      justify-content: space-between;
      font-size: var(--text-sm);
      color: var(--on-surface-variant);
      margin-top: var(--space-2);
    }

    .budget-amounts .spent { color: var(--error); font-weight: 500; }
    .budget-amounts .total { color: var(--on-surface); font-weight: 500; }

    .budget-categories {
      margin-top: var(--space-5);
    }

    .budget-category-item {
      margin-bottom: var(--space-3);
    }

    .budget-category-item:last-child {
      margin-bottom: 0;
    }

    .budget-category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-2);
    }

    .budget-category-name {
      font-size: var(--text-sm);
      color: var(--on-surface);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .budget-category-amount {
      font-size: var(--text-xs);
      color: var(--on-surface-variant);
    }

    .budget-category-bar {
      height: 6px;
      background: var(--surface-low);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .budget-category-fill {
      height: 100%;
      border-radius: var(--radius-full);
      transition: width var(--motion-slow) var(--ease-out);
    }

    .transaction-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .transaction-date-group {
      margin-bottom: var(--space-4);
    }

    .transaction-date-header {
      font-size: var(--text-xs);
      color: var(--on-surface-variant);
      margin-bottom: var(--space-2);
      font-weight: 500;
    }

    .quick-add {
      position: fixed;
      bottom: 90px;
      right: 24px;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--tertiary));
      color: var(--on-primary);
      border: none;
      border-radius: var(--radius-full);
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--elev-3);
      cursor: pointer;
      z-index: 90;
      transition: all var(--motion-fast) var(--ease-out);
      text-decoration: none;
    }

    .quick-add:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 24px rgba(104, 90, 103, 0.3);
    }

    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Desktop Navigation -->
  <nav class="nav-desktop">
    <div class="nav-brand">
      <div class="nav-brand-logo">💰</div>
      <span class="nav-brand-name">Velvet</span>
    </div>
    <a href="home.html" class="nav-item active">
      <span class="nav-item-icon">🏠</span>
      首页
    </a>
    <a href="records.html" class="nav-item">
      <span class="nav-item-icon">📋</span>
      明细
    </a>
    <a href="statistics.html" class="nav-item">
      <span class="nav-item-icon">📊</span>
      统计
    </a>
    <a href="budget.html" class="nav-item">
      <span class="nav-item-icon">💰</span>
      预算
    </a>
    <a href="categories.html" class="nav-item">
      <span class="nav-item-icon">📁</span>
      分类
    </a>
    <a href="profile.html" class="nav-item">
      <span class="nav-item-icon">👤</span>
      我的
    </a>
  </nav>

  <!-- Mobile Bottom Navigation -->
  <nav class="nav-mobile">
    <a href="home.html" class="nav-item active">
      <span class="nav-item-icon">🏠</span>
    </a>
    <a href="records.html" class="nav-item">
      <span class="nav-item-icon">📋</span>
    </a>
    <a href="add-expense.html" class="nav-item" style="transform:translateY(-20px);">
      <span class="nav-item-icon" style="width:56px;height:56px;background:linear-gradient(135deg, var(--primary), var(--tertiary));border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:28px;">+</span>
    </a>
    <a href="statistics.html" class="nav-item">
      <span class="nav-item-icon">📊</span>
    </a>
    <a href="profile.html" class="nav-item">
      <span class="nav-item-icon">👤</span>
    </a>
  </nav>

  <!-- Main Content -->
  <main class="page-with-nav">
    <div class="page-content">
      <div class="home-header">
        <div class="home-greeting">
          <h1 id="greeting">早上好</h1>
          <p>记录每一笔消费，掌控财务生活</p>
        </div>
        <div class="home-avatar" onclick="VelvetApp.navigateTo('profile.html')">👤</div>
      </div>

      <!-- Stats Cards -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card-label">💰 本月收入</div>
          <div class="stat-card-value income" id="monthIncome">¥0.00</div>
          <div class="stat-card-change" id="incomeChange"></div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">📤 本月支出</div>
          <div class="stat-card-value expense" id="monthExpense">¥0.00</div>
          <div class="stat-card-change" id="expenseChange"></div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">💵 收支结余</div>
          <div class="stat-card-value" id="monthBalance">¥0.00</div>
          <div class="stat-card-change" id="balanceChange"></div>
        </div>
      </div>

      <!-- Budget Overview -->
      <div class="budget-section" id="budgetSection" style="display:none;">
        <div class="budget-header">
          <div class="budget-title">本月预算执行</div>
          <a href="budget.html" class="section-link">详情 →</a>
        </div>
        <div class="budget-overview">
          <div class="budget-progress-wrap">
            <div class="progress-bar" style="height:10px;">
              <div class="progress-bar-fill" id="budgetProgressFill" style="width:0%"></div>
            </div>
            <div class="budget-amounts">
              <span>已花费 <span class="spent" id="budgetSpent">¥0</span></span>
              <span>预算 <span class="total" id="budgetTotal">¥0</span></span>
            </div>
          </div>
          <div id="budgetRing"></div>
        </div>
        <div class="budget-categories" id="budgetCategories"></div>
      </div>

      <!-- Recent Transactions -->
      <div class="section-header">
        <h2 class="section-title">最近交易</h2>
        <a href="records.html" class="section-link">查看全部 →</a>
      </div>
      <div id="recentTransactions">
        <div class="empty-state">
          <div class="empty-state-icon">📝</div>
          <div class="empty-state-title">暂无记录</div>
          <div class="empty-state-desc">点击下方"记一笔"开始记录你的第一笔消费</div>
        </div>
      </div>
    </div>
  </main>

  <!-- Floating Action Button -->
  <a href="add-expense.html" class="quick-add">+</a>

  <script src="../assets/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // requireAuth disabled for demo

      const user = VelvetApp.Auth.getCurrentUser();
      document.getElementById('greeting').textContent = getGreeting() + '，' + user.username;

      // 生成示例数据（如果为空）
      const records = VelvetApp.Auth.getUserRecords();
      if (records.length === 0) {
        VelvetApp.generateSampleData();
      }

      loadDashboard();

      function getGreeting() {
        const hour = new Date().getHours();
        if (hour < 6) return '凌晨好';
        if (hour < 9) return '早上好';
        if (hour < 12) return '上午好';
        if (hour < 14) return '中午好';
        if (hour < 18) return '下午好';
        if (hour < 22) return '晚上好';
        return '夜深了';
      }

      function loadDashboard() {
        const records = VelvetApp.Auth.getUserRecords();
        const budgets = VelvetApp.Auth.getUserBudgets();

        // 计算本月数据
        const { start, end } = VelvetApp.getDateRange('month');
        const monthRecords = VelvetApp.filterRecords(records, { period: 'month' });
        const stats = VelvetApp.calculateStats(monthRecords);

        // 更新统计卡片
        document.getElementById('monthIncome').textContent = '¥' + VelvetApp.formatCurrency(stats.totalIncome);
        document.getElementById('monthExpense').textContent = '¥' + VelvetApp.formatCurrency(stats.totalExpense);
        document.getElementById('monthBalance').textContent = '¥' + VelvetApp.formatCurrency(stats.netBalance);

        const balanceEl = document.getElementById('monthBalance');
        if (stats.netBalance >= 0) {
          balanceEl.classList.remove('expense');
          balanceEl.classList.add('income');
        } else {
          balanceEl.classList.remove('income');
          balanceEl.classList.add('expense');
        }

        // 更新预算进度
        if (budgets.total > 0) {
          const budgetProgress = VelvetApp.calculateBudgetProgress(budgets, records, 'month');
          const { total } = budgetProgress;

          document.getElementById('budgetSection').style.display = 'block';
          document.getElementById('budgetSpent').textContent = '¥' + VelvetApp.formatCurrency(total.spent);
          document.getElementById('budgetTotal').textContent = '¥' + VelvetApp.formatCurrency(total.budget);

          const progressFill = document.getElementById('budgetProgressFill');
          progressFill.style.width = total.percentage + '%';
          progressFill.className = 'progress-bar-fill';
          if (total.isOverBudget) progressFill.classList.add('danger');
          else if (total.isWarning) progressFill.classList.add('warn');
          else progressFill.classList.add('success');

          document.getElementById('budgetRing').innerHTML = VelvetApp.createRingProgress(total.percentage, {
            size: 80,
            strokeWidth: 6,
            color: total.isOverBudget ? 'var(--error)' : total.isWarning ? 'var(--warn)' : 'var(--success)'
          });

          // 分类预算
          const categoriesEl = document.getElementById('budgetCategories');
          if (Object.keys(budgetProgress.categories).length > 0) {
            let html = '';
            Object.entries(budgetProgress.categories).forEach(([catId, cat]) => {
              const catData = VelvetApp.Auth.getUserCategories().expense.find(c => c.id === catId);
              if (!catData) return;

              html += `
                <div class="budget-category-item">
                  <div class="budget-category-header">
                    <span class="budget-category-name">
                      <span>${catData.emoji}</span>
                      <span>${catData.name}</span>
                    </span>
                    <span class="budget-category-amount">¥${VelvetApp.formatCurrency(cat.spent)} / ¥${VelvetApp.formatCurrency(cat.budget)}</span>
                  </div>
                  <div class="budget-category-bar">
                    <div class="budget-category-fill" style="width:${cat.percentage}%;background:${cat.isOverBudget ? 'var(--error)' : cat.isWarning ? 'var(--warn)' : 'var(--primary)'}"></div>
                  </div>
                </div>
              `;
            });
            categoriesEl.innerHTML = html;
          }
        }

        // 最近交易
        const recentEl = document.getElementById('recentTransactions');
        const recentRecords = records.slice(0, 5);

        if (recentRecords.length > 0) {
          const grouped = VelvetApp.groupRecordsByDate(recentRecords);
          let html = '';

          Object.entries(grouped).forEach(([date, recs]) => {
            const dayTotal = recs.reduce((sum, r) => r.type === 'income' ? sum + r.amount : sum - r.amount, 0);
            html += `
              <div class="transaction-date-group">
                <div class="transaction-date-header">${date} · 余额 ${dayTotal >= 0 ? '+' : ''}¥${VelvetApp.formatCurrency(dayTotal)}</div>
                ${recs.map(r => `
                  <div class="transaction-item" onclick="VelvetApp.navigateTo('add-expense.html?edit=${r.id}')">
                    <div class="transaction-icon">${r.categoryEmoji}</div>
                    <div class="transaction-details">
                      <div class="transaction-category">${r.categoryName}</div>
                      <div class="transaction-note">${r.note || (r.paymentMethodName ? r.paymentMethodName : '')}</div>
                    </div>
                    <div class="transaction-amount ${r.type === 'income' ? 'income' : ''}">
                      ${r.type === 'income' ? '+' : '-'}¥${VelvetApp.formatCurrency(r.amount)}
                    </div>
                  </div>
                `).join('')}
              </div>
            `;
          });

          recentEl.innerHTML = html;
        }
      }
    });
  </script>
</body>
</html>
