<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>明细 - Velvet Ledger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../assets/styles.css">
  <style>
    .records-header {
      margin-bottom: var(--space-6);
    }

    .records-title {
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--on-surface);
      margin-bottom: var(--space-2);
    }

    .records-subtitle {
      font-size: var(--text-sm);
      color: var(--on-surface-variant);
    }

    .filter-bar {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
      flex-wrap: wrap;
    }

    .filter-chip {
      padding: var(--space-2) var(--space-3);
      font-size: var(--text-xs);
      background: var(--surface);
      border: 1px solid var(--outline-variant);
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: all var(--motion-fast) var(--ease-out);
      white-space: nowrap;
    }

    .filter-chip:hover {
      border-color: var(--primary);
    }

    .filter-chip.active {
      background: var(--primary);
      color: var(--on-primary);
      border-color: var(--primary);
    }

    .search-bar {
      position: relative;
      margin-bottom: var(--space-4);
    }

    .search-input {
      width: 100%;
      padding: var(--space-3) var(--space-4) var(--space-3) 40px;
      font-size: var(--text-sm);
      color: var(--on-surface);
      background: var(--surface);
      border: 1px solid var(--outline-variant);
      border-radius: var(--radius-md);
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--on-surface-variant);
    }

    .records-summary {
      display: flex;
      gap: var(--space-4);
      padding: var(--space-4);
      background: var(--surface);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-6);
    }

    .summary-item {
      flex: 1;
      text-align: center;
    }

    .summary-label {
      font-size: var(--text-xs);
      color: var(--on-surface-variant);
      margin-bottom: var(--space-1);
    }

    .summary-value {
      font-size: var(--text-base);
      font-weight: 600;
    }

    .summary-value.income { color: var(--success); }
    .summary-value.expense { color: var(--error); }

    .records-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .date-group {
      margin-bottom: var(--space-4);
    }

    .date-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-2) 0;
      margin-bottom: var(--space-2);
    }

    .date-title {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--on-surface);
    }

    .date-summary {
      font-size: var(--text-xs);
      color: var(--on-surface-variant);
    }

    .record-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3);
      background: var(--surface);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--motion-fast) var(--ease-out);
    }

    .record-item:hover {
      background: var(--surface-container);
      box-shadow: var(--elev-1);
    }

    .record-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      background: var(--surface-low);
      flex-shrink: 0;
    }

    .record-details {
      flex: 1;
      min-width: 0;
    }

    .record-category {
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--on-surface);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .record-meta {
      font-size: var(--text-xs);
      color: var(--on-surface-variant);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .record-amount {
      font-size: var(--text-base);
      font-weight: 600;
      white-space: nowrap;
    }

    .record-amount.income { color: var(--success); }
    .record-amount.expense { color: var(--on-surface); }

    .records-pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
      margin-top: var(--space-6);
    }

    .pagination-btn {
      padding: var(--space-2) var(--space-4);
      font-size: var(--text-sm);
      background: var(--surface);
      border: 1px solid var(--outline-variant);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--motion-fast) var(--ease-out);
    }

    .pagination-btn:hover:not(:disabled) {
      border-color: var(--primary);
    }

    .pagination-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .pagination-info {
      font-size: var(--text-sm);
      color: var(--on-surface-variant);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-16) var(--space-8);
      text-align: center;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: var(--space-4);
      opacity: 0.5;
    }

    .empty-title {
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--on-surface);
      margin-bottom: var(--space-2);
    }

    .empty-desc {
      font-size: var(--text-sm);
      color: var(--on-surface-variant);
    }

    .quick-add {
      position: fixed;
      bottom: 90px;
      right: 24px;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--tertiary));
      color: var(--on-primary);
      border: none;
      border-radius: var(--radius-full);
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--elev-3);
      cursor: pointer;
      z-index: 90;
      transition: all var(--motion-fast) var(--ease-out);
      text-decoration: none;
    }

    .quick-add:hover {
      transform: scale(1.08);
    }
  </style>
</head>
<body>
  <!-- Desktop Navigation -->
  <nav class="nav-desktop">
    <div class="nav-brand">
      <div class="nav-brand-logo">💰</div>
      <span class="nav-brand-name">Velvet</span>
    </div>
    <a href="home.html" class="nav-item">
      <span class="nav-item-icon">🏠</span>
      首页
    </a>
    <a href="records.html" class="nav-item active">
      <span class="nav-item-icon">📋</span>
      明细
    </a>
    <a href="statistics.html" class="nav-item">
      <span class="nav-item-icon">📊</span>
      统计
    </a>
    <a href="budget.html" class="nav-item">
      <span class="nav-item-icon">💰</span>
      预算
    </a>
    <a href="categories.html" class="nav-item">
      <span class="nav-item-icon">📁</span>
      分类
    </a>
    <a href="profile.html" class="nav-item">
      <span class="nav-item-icon">👤</span>
      我的
    </a>
  </nav>

  <!-- Mobile Bottom Navigation -->
  <nav class="nav-mobile">
    <a href="home.html" class="nav-item">
      <span class="nav-item-icon">🏠</span>
    </a>
    <a href="records.html" class="nav-item active">
      <span class="nav-item-icon">📋</span>
    </a>
    <a href="add-expense.html" class="nav-item" style="transform:translateY(-20px);">
      <span class="nav-item-icon" style="width:56px;height:56px;background:linear-gradient(135deg, var(--primary), var(--tertiary));border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:28px;">+</span>
    </a>
    <a href="statistics.html" class="nav-item">
      <span class="nav-item-icon">📊</span>
    </a>
    <a href="profile.html" class="nav-item">
      <span class="nav-item-icon">👤</span>
    </a>
  </nav>

  <!-- Main Content -->
  <main class="page-with-nav">
    <div class="page-content">
      <div class="records-header">
        <h1 class="records-title">消费明细</h1>
        <p class="records-subtitle" id="recordsSubtitle">查看所有交易记录</p>
      </div>

      <!-- Filters -->
      <div class="filter-bar" id="periodFilters">
        <span class="filter-chip active" data-period="week">本周</span>
        <span class="filter-chip" data-period="month">本月</span>
        <span class="filter-chip" data-period="3months">近3月</span>
        <span class="filter-chip" data-period="all">全部</span>
      </div>

      <div class="filter-bar" id="typeFilters">
        <span class="filter-chip active" data-type="all">全部</span>
        <span class="filter-chip" data-type="expense">支出</span>
        <span class="filter-chip" data-type="income">收入</span>
      </div>

      <!-- Search -->
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索备注...">
      </div>

      <!-- Summary -->
      <div class="records-summary" id="recordsSummary">
        <div class="summary-item">
          <div class="summary-label">收入</div>
          <div class="summary-value income" id="summaryIncome">¥0.00</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">支出</div>
          <div class="summary-value expense" id="summaryExpense">¥0.00</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">结余</div>
          <div class="summary-value" id="summaryBalance">¥0.00</div>
        </div>
      </div>

      <!-- Records List -->
      <div class="records-list" id="recordsList"></div>

      <!-- Pagination -->
      <div class="records-pagination" id="pagination" style="display:none;">
        <button class="pagination-btn" id="prevBtn">上一页</button>
        <span class="pagination-info" id="pageInfo">1 / 1</span>
        <button class="pagination-btn" id="nextBtn">下一页</button>
      </div>
    </div>
  </main>

  <!-- Floating Action Button -->
  <a href="add-expense.html" class="quick-add">+</a>

  <script src="../assets/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // requireAuth disabled for demo

      let currentPeriod = 'month';
      let currentType = 'all';
      let currentKeyword = '';
      let currentPage = 1;
      const pageSize = 20;

      loadRecords();

      // 期限筛选
      document.querySelectorAll('#periodFilters .filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.querySelectorAll('#periodFilters .filter-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          currentPeriod = chip.dataset.period;
          currentPage = 1;
          loadRecords();
        });
      });

      // 类型筛选
      document.querySelectorAll('#typeFilters .filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.querySelectorAll('#typeFilters .filter-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          currentType = chip.dataset.type;
          currentPage = 1;
          loadRecords();
        });
      });

      // 搜索
      document.getElementById('searchInput').addEventListener('input', (e) => {
        currentKeyword = e.target.value.trim();
        currentPage = 1;
        loadRecords();
      });

      // 分页
      document.getElementById('prevBtn').addEventListener('click', () => {
        if (currentPage > 1) {
          currentPage--;
          loadRecords();
        }
      });

      document.getElementById('nextBtn').addEventListener('click', () => {
        currentPage++;
        loadRecords();
      });

      function loadRecords() {
        const records = VelvetApp.Auth.getUserRecords();

        // 筛选
        let filtered = VelvetApp.filterRecords(records, {
          period: currentPeriod === 'all' ? null : currentPeriod,
          type: currentType === 'all' ? null : currentType,
          keyword: currentKeyword || null
        });

        // 统计
        const stats = VelvetApp.calculateStats(filtered);
        document.getElementById('summaryIncome').textContent = '¥' + VelvetApp.formatCurrency(stats.totalIncome);
        document.getElementById('summaryExpense').textContent = '¥' + VelvetApp.formatCurrency(stats.totalExpense);
        const balanceEl = document.getElementById('summaryBalance');
        balanceEl.textContent = '¥' + VelvetApp.formatCurrency(stats.netBalance);
        balanceEl.className = 'summary-value ' + (stats.netBalance >= 0 ? 'income' : 'expense');

        // 更新标题
        const periodNames = { week: '本周', month: '本月', '3months': '近3月', all: '全部' };
        document.getElementById('recordsSubtitle').textContent =
          `${periodNames[currentPeriod]} · 共 ${filtered.length} 笔记录`;

        // 分页
        const totalPages = Math.ceil(filtered.length / pageSize) || 1;
        const start = (currentPage - 1) * pageSize;
        const end = start + pageSize;
        const pageRecords = filtered.slice(start, end);

        // 渲染列表
        const listEl = document.getElementById('recordsList');

        if (pageRecords.length === 0) {
          listEl.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">📝</div>
              <div class="empty-title">暂无记录</div>
              <div class="empty-desc">尝试调整筛选条件或添加新记录</div>
            </div>
          `;
        } else {
          const grouped = VelvetApp.groupRecordsByDate(pageRecords);
          let html = '';

          Object.entries(grouped).forEach(([date, recs]) => {
            const dayIncome = recs.filter(r => r.type === 'income').reduce((sum, r) => sum + r.amount, 0);
            const dayExpense = recs.filter(r => r.type === 'expense').reduce((sum, r) => sum + r.amount, 0);
            const dayBalance = dayIncome - dayExpense;

            html += `
              <div class="date-group">
                <div class="date-header">
                  <span class="date-title">${date}</span>
                  <span class="date-summary">
                    收入 ¥${VelvetApp.formatCurrency(dayIncome)} · 支出 ¥${VelvetApp.formatCurrency(dayExpense)} · 结余 ${dayBalance >= 0 ? '+' : ''}¥${VelvetApp.formatCurrency(dayBalance)}
                  </span>
                </div>
                ${recs.map(r => `
                  <div class="record-item" onclick="VelvetApp.navigateTo('add-expense.html?edit=${r.id}')">
                    <div class="record-icon">${r.categoryEmoji}</div>
                    <div class="record-details">
                      <div class="record-category">${r.categoryName}</div>
                      <div class="record-meta">
                        <span>${r.paymentMethodName || ''}</span>
                        ${r.note ? `<span>·</span><span>${r.note}</span>` : ''}
                      </div>
                    </div>
                    <div class="record-amount ${r.type === 'income' ? 'income' : ''}">
                      ${r.type === 'income' ? '+' : '-'}¥${VelvetApp.formatCurrency(r.amount)}
                    </div>
                  </div>
                `).join('')}
              </div>
            `;
          });

          listEl.innerHTML = html;
        }

        // 更新分页
        const paginationEl = document.getElementById('pagination');
        if (filtered.length > pageSize) {
          paginationEl.style.display = 'flex';
          document.getElementById('pageInfo').textContent = `${currentPage} / ${totalPages}`;
          document.getElementById('prevBtn').disabled = currentPage === 1;
          document.getElementById('nextBtn').disabled = currentPage >= totalPages;
        } else {
          paginationEl.style.display = 'none';
        }
      }
    });
  </script>
</body>
</html>
